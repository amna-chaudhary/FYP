<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GEC Marketplace</title>
  <link rel="stylesheet" href="./static/style.css" />
</head>
<body data-page="marketplace">
  <header class="app-header">
    <div>
      <p class="eyebrow">GEC Agent</p>
      <h1>Marketplace</h1>
    </div>
    <nav class="main-nav">
      <a class="nav-link" href="./chat.html">Chat</a>
      <a class="nav-link" href="./registry.html">Registry</a>
      <a class="nav-link is-active" href="./marketplace.html">Marketplace</a>
      <a class="nav-link" href="./certificate.html">Certificate</a>
    </nav>
    <div class="header-actions">
      <button id="notification-toggle" class="icon-btn" type="button" aria-expanded="false">Notifications</button>
      <div id="notification-panel" class="notification-panel hidden"></div>
      <button id="logout-btn" class="secondary-btn" type="button">Log out</button>
    </div>
  </header>

  <main class="dashboard-grid marketplace-grid">
    <section class="panel">
      <div class="panel-header">
        <div>
          <p class="eyebrow">TODO-8.5</p>
          <h2>Listing feed</h2>
        </div>
        <button id="marketplace-refresh" class="secondary-btn" type="button">Refresh</button>
      </div>
      <div class="tab-row">
        <button class="tab-btn is-active" data-market-tab="all" type="button">All listings</button>
        <button class="tab-btn" data-market-tab="mine" type="button">My listings</button>
      </div>
      <div id="marketplace-alert" class="alert hidden"></div>
      <div id="marketplace-list" class="card-list"></div>
    </section>

    <aside class="panel">
      <div class="panel-header">
        <div>
          <p class="eyebrow">Action center</p>
          <h2>Buy or sell</h2>
        </div>
      </div>
      <div class="action-stack">
        <p class="muted">
          The marketplace feed reflects the authenticated registry state. Use the action buttons to open a guided chat command for buying, listing, or cancelling an offer.
        </p>
        <button id="open-buy-draft" class="chip-btn" type="button">Draft buy request</button>
        <button id="open-sell-draft" class="chip-btn" type="button">Draft sell listing</button>
      </div>
    </aside>
  </main>

  <script defer src="./static/app.js"></script>
</body>
</html>
